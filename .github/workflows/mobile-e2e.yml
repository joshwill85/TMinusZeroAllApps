name: Mobile E2E

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'scripts/**'
      - 'eas.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/mobile-e2e.yml'

permissions:
  contents: read

jobs:
  ios-detox:
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      EXPO_NO_DOCTOR: "1"
      EXPO_PUBLIC_EAS_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_EAS_PROJECT_ID }}
      EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_MOBILE_E2E_PUSH: "1"
      EXPO_PUBLIC_MOBILE_E2E_PUSH_TOKEN: "ExponentPushToken[detox-e2e]"
      TMZ_MOBILE_E2E_EMAIL: ${{ secrets.TMZ_MOBILE_E2E_EMAIL }}
      TMZ_MOBILE_E2E_PASSWORD: ${{ secrets.TMZ_MOBILE_E2E_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Toolchain doctor
        run: npm run doctor

      - name: Install (npm ci)
        run: npm ci

      - name: Build iOS Detox app
        run: npm run mobile:e2e:build:ios

      - name: Acceptance preflight with iOS Detox
        run: npm run acceptance:preflight -- --include-mobile-e2e --mobile-e2e-command=mobile:e2e:test:ios:artifacts --out-dir=.artifacts/three-platform-acceptance --ttfb-requests=5 --ttfb-warmup=2

      - name: Upload iOS acceptance preflight artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: three-platform-acceptance-ios
          path: .artifacts/three-platform-acceptance
          if-no-files-found: ignore

      - name: Upload iOS Detox artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-e2e-ios
          path: apps/mobile/.artifacts/detox/ios
          if-no-files-found: ignore

  android-detox:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CI: "true"
      EXPO_NO_DOCTOR: "1"
      EXPO_PUBLIC_EAS_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_EAS_PROJECT_ID }}
      EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_MOBILE_E2E_PUSH: "1"
      EXPO_PUBLIC_MOBILE_E2E_PUSH_TOKEN: "ExponentPushToken[detox-e2e]"
      TMZ_MOBILE_E2E_EMAIL: ${{ secrets.TMZ_MOBILE_E2E_EMAIL }}
      TMZ_MOBILE_E2E_PASSWORD: ${{ secrets.TMZ_MOBILE_E2E_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Toolchain doctor
        run: npm run doctor

      - name: Install (npm ci)
        run: npm ci

      - name: Mobile lint
        run: npm run lint --workspace @tminuszero/mobile

      - name: Mobile type-check
        run: npm run type-check:mobile

      - name: V1 contracts
        run: npm run test:v1-contracts

      - name: Mobile query guard
        run: npm run test:mobile-query-guard

      - name: Mobile security guard
        run: npm run test:mobile-security-guard

      - name: Run Android Detox smoke suite
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_8
          script: npm run mobile:e2e:acceptance:android

      - name: Upload Android Detox artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-e2e-android
          path: apps/mobile/.artifacts/detox/android
          if-no-files-found: ignore
